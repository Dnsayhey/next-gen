version: 1
fail_fast: false

vars:
  base_url: https://httpbin.org

steps:
  # 固定间隔重试：本步骤故意请求 500 并断言 200，用于观察失败后的重试行为
  fixed_retry:
    request:
      method: GET
      url: ${base_url}/status/500
    config:
      retry: 2
      retry_delay: 1
    validate:
      - eq: [$$.status_code, 200]

  # 指数退避重试：本步骤同样故意失败，用于观察 1s / 2s / 4s 的退避等待
  backoff_retry:
    request:
      method: GET
      url: ${base_url}/status/500
    config:
      retry: 3
      retry_delay: 1
      retry_backoff: true
      retry_max_delay: 10
    validate:
      - eq: [$$.status_code, 200]
