version: 1

vars:
  base_url: https://httpbin.org
  user: admin

steps:
  # set_vars 仅在当前步骤内可见
  setup:
    set_vars:
      user1: ${user}_1
      endpoint: ${base_url}/get
    request:
      method: GET
      url: ${endpoint}
      params:
        user: ${user1}
    extract:
      echoed_user: $.args.user
    validate:
      - eq: ["$.args.user", "admin_1"]

  # 跨步骤复用请使用 extract 导出的变量
  use_extracted_vars:
    depends_on: [setup]
    set_vars:
      post_url: ${base_url}/post
    request:
      method: POST
      url: ${post_url}
      json:
        user: ${echoed_user}
    validate:
      - eq: ["$.json.user", "admin_1"]
