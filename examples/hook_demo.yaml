# Hook 示例
# 运行方式：
#   uv run nextgen examples/hook_demo.yaml --verbose
#
# 说明：
# - 当前目录下的 hooks.py 会被自动发现并加载
# - before_all 中的 hook 可向全局上下文注入变量
# - set_vars / before / after 默认是步骤局部变量
# - extract 声明出的变量会回写到全局上下文，供后续步骤使用

version: 1

vars:
  base_url: https://httpbin.org

hooks:
  before_all:
    - set_vars:
        env_name: staging
        channel: api
    - get_timestamp: suite_start
    - log: "测试开始 env=${env_name}, channel=${channel}"

  after_all:
    - get_timestamp: suite_end
    - log: "测试结束 env=${env_name}"

  before_each:
    - log: "准备执行步骤"

  after_each:
    - log: "步骤执行完成"

steps:
  login:
    set_vars:
      user: admin
    request:
      method: POST
      url: ${base_url}/post
      json:
        user: ${user}
        env: ${env_name}
    hooks:
      before:
        - get_random_str: { var: "request_id", length: 12 }
        - log: "发起登录 user=${user}, request_id=${request_id}"
      after:
        - mask_token: { source: "token", target: "masked_token" }
        - log: "登录结束 token=${masked_token}"
    extract:
      token: $.json.user
    validate:
      - eq: [$.json.user, admin]

  fetch_profile:
    depends_on: [login]
    request:
      method: GET
      url: ${base_url}/get
      params:
        token: ${token}
        channel: ${channel}
    hooks:
      before:
        - log: "查询资料 token=${token}, channel=${channel}"
    validate:
      - eq: [$.args.token, admin]
      - eq: [$.args.channel, api]
