version: 1
mode: parallel

vars:
  base_url: https://httpbin.org

steps:
  # 这两个步骤没有依赖，parallel 模式下可同时调度
  get_ip:
    request:
      method: GET
      url: ${base_url}/ip
    validate:
      - eq: [$.status_code, 200]

  get_user_agent:
    request:
      method: GET
      url: ${base_url}/user-agent
    validate:
      - eq: [$.status_code, 200]

  # 依赖两个并行步骤完成后再执行
  after_parallel:
    depends_on: [get_ip, get_user_agent]
    request:
      method: GET
      url: ${base_url}/get
      params:
        done: "true"
    validate:
      - eq: [$.args.done, "true"]
