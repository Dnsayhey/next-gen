# Next-Gen API Test Engine 完整示例
# 展示所有支持的功能

version: 1

# 执行模式，默认 sequential
# - sequential：每轮按定义顺序只执行一个可运行步骤
# - parallel：每轮可并发执行多个可运行步骤（受 --parallel 并发上限控制）
mode: sequential

# 失败后是否跳过尚未开始的步骤，默认 true
# 已运行中的并发步骤不会被强制取消
fail_fast: true

vars:
  base_url: https://httpbin.org

steps:
  # 1. 基础 GET 请求 + 查询参数
  get_with_params:
    request:
      method: GET
      url: ${base_url}/get
      params:
        name: test
        age: "25"
    extract:
      param_name: $.args.name
      param_age:
        jsonpath: $.args.age
    validate:
      - eq: [$.args.name, test]
      - eq: [$.args.age, "25"]
      - in: [$.args.name, [test, demo]]
      - len_eq: [$.args.name, 4]

  # 2. JSON POST 请求 + 变量提取
  post_json:
    request:
      method: POST
      url: ${base_url}/post
      json:
        username: admin
        password: "123456"
    extract:
      request_body: $.json
      password_suffix:
        regex: '"password":"([0-9]+)"'
        group: 1
    validate:
      - eq: [$.json.username, admin]
      - starts_with: [$.json.username, ad]
      - ends_with: [$.json.password, "456"]
      - matches: [$.json.username, "^adm"]
      - not_contains: [$.json.username, guest]

  # 3. Form 表单提交
  post_form:
    request:
      method: POST
      url: ${base_url}/post
      form:
        field1: value1
        field2: value2
    validate:
      - eq: [$.form.field1, value1]

  # 4. Multipart 文件上传（引用同目录下的 test_upload.csv）
  upload_file:
    request:
      method: POST
      url: ${base_url}/post
      multipart:
        file: "@./test_upload.csv"
        description: 测试文件
    validate:
      - eq: [$.form.description, 测试文件]

  # 5. Raw Body（XML/纯文本）
  post_raw:
    request:
      method: POST
      url: ${base_url}/post
      body: "<root><name>test</name></root>"
      content_type: application/xml
    validate:
      - eq: [$.data, <root><name>test</name></root>]

  # 6. 依赖关系（DAG）
  dependent_step:
    depends_on: [get_with_params, post_json]
    request:
      method: GET
      url: ${base_url}/get
      params:
        ref: ${param_name}
    validate:
      - eq: [$.args.ref, test]

  # 7. 自定义请求头
  custom_headers:
    request:
      method: GET
      url: ${base_url}/headers
      headers:
        X-Custom-Header: my-value
        Authorization: Bearer token123
    validate:
      - contains: [$.headers.X-Custom-Header, my-value]  # 验证请求头在响应中

  # 8. 重试配置
  with_retry:
    request:
      method: GET
      url: ${base_url}/get
    config:
      retry: 2
      retry_delay: 1
    validate:
      - eq: [$.status_code, 200]
