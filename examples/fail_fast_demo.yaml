version: 1
mode: sequential
fail_fast: false

vars:
  base_url: https://httpbin.org

steps:
  # 故意失败：用于观察 fail_fast: false 下独立步骤仍会继续
  failing_root:
    request:
      method: GET
      url: ${base_url}/status/500
    validate:
      - eq: [$.status_code, 200]

  # 依赖失败步骤，因此会被 skipped
  dependent_on_failure:
    depends_on: [failing_root]
    request:
      method: GET
      url: ${base_url}/get
    validate:
      - eq: [$.status_code, 200]

  # 与失败步骤无依赖，因此 fail_fast: false 时会继续执行
  independent_after_failure:
    request:
      method: GET
      url: ${base_url}/get
      params:
        still_runs: "true"
    validate:
      - eq: [$.args.still_runs, "true"]
