version: 1

vars:
  base_url: https://httpbin.org
  env: staging

steps:
  # 步骤 1: 获取环境信息
  get_env:
    request:
      method: GET
      url: ${base_url}/get
      params:
        env: ${env}
    extract:
      response_env: $.args.env
    validate:
      - eq: ["$.args.env", "staging"]

  # 步骤 2: 条件执行 - 仅在 staging 环境执行
  staging_only:
    when:
      - eq: ["${env}", "staging"]
    request:
      method: POST
      url: ${base_url}/post
      json:
        action: staging_test
        env: ${env}
    validate:
      - eq: ["$.json.action", "staging_test"]

  # 步骤 3: 条件执行 - 仅在 production 或 development 环境执行
  prod_or_dev:
    when:
      or:
        - eq: ["${env}", "production"]
        - eq: ["${env}", "development"]
    request:
      method: POST
      url: ${base_url}/post
      json:
        action: prod_dev_test
    validate:
      - eq: ["$.json.action", "prod_dev_test"]

  # 步骤 4: 复合条件 - AND 逻辑
  complex_condition:
    when:
      and:
        - eq: ["${env}", "staging"]
        - ne: ["${response_env}", "production"]
    request:
      method: GET
      url: ${base_url}/get
      params:
        check: complex
    validate:
      - eq: ["$.args.check", "complex"]

  # 步骤 5: 无条件执行（默认）
  always_run:
    depends_on: [get_env]
    request:
      method: GET
      url: ${base_url}/get
    validate:
      - eq: [$.status_code, 200]
