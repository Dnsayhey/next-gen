version: 1

vars:
  base_url: https://httpbin.org

steps:
  # 请求级超时测试（正常请求，超时设置较长）
  normal_request:
    request:
      method: GET
      url: ${base_url}/get
      timeout: 10
    validate:
      - eq: [$.status_code, 200]

  # 请求级超时测试（模拟延迟，超时设置较短，预期失败）
  delay_request:
    request:
      method: GET
      url: ${base_url}/delay/5
      timeout: 2  # 2秒超时，但请求需要5秒
    validate:
      - eq: [$.status_code, 200]

  # 步骤级超时测试
  step_timeout:
    request:
      method: GET
      url: ${base_url}/get
    config:
      timeout: 10
    validate:
      - eq: [$.status_code, 200]
